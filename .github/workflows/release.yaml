# Disabled: release binaries now require plugin selection at build time.
# Re-enable once udb-builder (separate repo) is operational.
# See docs/ROADMAP.md for the planned release flow.
name: Release for Raspberry Pi

on: {} # disabled

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    env:
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.1'

      - name: Set GOPATH
        run: echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV

      - name: Go Tidy
        run: go mod tidy && git diff --exit-code

      - name: Go Mod
        run: go mod download

      - name: Go Mod Verify
        run: go mod verify

      - name: Set up LED Matrix Library
        run: ./scripts/setup_matrix_library.sh

      - name: Build
        run: go build -v -o udb-linux-arm64 .

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: udb-linux-arm64
