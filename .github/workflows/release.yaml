name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    env:
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Set GOPATH
        run: echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV

      - name: Set up LED Matrix Library
        run: ./scripts/setup_matrix_library.sh

      - name: Build
        run: go build -v -ldflags="-s -w" -o udb ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: udb
          generate_release_notes: true
